service: docai
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - textract:AnalyzeID
          Resource: "*"
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource:
            - arn:aws:s3:::*/*
  environment:
    APP_AWS_REGION: ${self:provider.region}
    NODE_OPTIONS: --enable-source-maps

functions:
  api:
    handler: dist/lambda.handler
    timeout: 30
    events:
      - httpApi:
          path: /{proxy+}
          method: '*'
      - httpApi:
          path: /
          method: '*'

package:
  patterns:
    - dist/**
    - package.json
    - '!src/**'
    - '!node_modules/.cache/**'
